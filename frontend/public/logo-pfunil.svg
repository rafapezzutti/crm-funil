<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 110" width="250" height="110">
  <defs>
    <linearGradient id="gMain" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4fd6"/>
      <stop offset="100%" stop-color="#00d8e8"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1055cc"/>
      <stop offset="100%" stop-color="#0030a0"/>
    </linearGradient>
  </defs>

  <!-- Stem (vertical bar of P) — dark side -->
  <polygon points="8,108 22,108 22,15 8,30"     fill="url(#gDark)"/>
  <!-- Top face of stem -->
  <polygon points="8,30 22,15 42,15 28,30"       fill="#18a8d8" opacity="0.95"/>
  <!-- Top horizontal bar of P -->
  <polygon points="22,15 64,15 64,28 22,28"      fill="#00e0f0" opacity="0.95"/>
  <!-- Right upper bow -->
  <polygon points="64,15 82,28 82,52 64,42"      fill="#00c8e0" opacity="0.9"/>
  <!-- Right bow inner facet -->
  <polygon points="64,42 82,52 72,68 50,62"      fill="#0088c8" opacity="0.9"/>
  <!-- Lower bow -->
  <polygon points="22,42 64,42 50,62 28,58"      fill="#0068b0" opacity="0.95"/>
  <!-- Stem lower -->
  <polygon points="22,55 28,58 22,108"           fill="#0048a0" opacity="0.95"/>
  <!-- Highlight -->
  <polygon points="28,18 60,18 64,28 28,28"      fill="white" opacity="0.12"/>
  <!-- Gem lines -->
  <line x1="22" y1="15" x2="64" y2="42" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="64" y1="15" x2="64" y2="42" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <line x1="22" y1="28" x2="82" y2="52" stroke="white" stroke-width="0.6" opacity="0.15"/>

  <!-- Text "Funil" -->
  <text x="100" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="300" fill="#00d8e8" letter-spacing="-1">Funil</text>
</svg>
