<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 110" width="250" height="110">
  <defs>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d8e8"/>
      <stop offset="100%" stop-color="#1a4fd6"/>
    </linearGradient>
    <linearGradient id="pBowl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00c8e0"/>
      <stop offset="100%" stop-color="#0060c0"/>
    </linearGradient>
  </defs>

  <!--
    P letter — upright, no isometric tilt.
    Stem: x=10–26, y=10–100
    Bowl outer: x=26–88, y=10–68, rounded right
    Bowl inner cutout: x=26–74, y=26–52
    even-odd rule creates the hollow bowl
  -->
  <path fill-rule="evenodd"
    d="
      M 10,100
      L 10,10
      L 60,10
      Q 92,10 92,39
      Q 92,68 60,68
      L 26,68
      L 26,100
      Z
      M 26,26
      L 60,26
      Q 76,26 76,39
      Q 76,52 60,52
      L 26,52
      Z
    "
    fill="url(#pGrad)"
  />

  <!-- Subtle highlight on top-left of stem -->
  <rect x="10" y="10" width="16" height="20" fill="white" opacity="0.12" rx="1"/>

  <!-- Text "Funil" -->
  <text x="106" y="76"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="46" font-weight="300" fill="#00d8e8" letter-spacing="-1">Funil</text>
</svg>
