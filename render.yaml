services:
  # ── Backend API (Node.js) ─────────────────────────
  - type: web
    name: crm-funil-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false          # set to your frontend URL after first deploy
      - key: PORT
        value: "3001"

  # ── Frontend (Static Site) ────────────────────────
  - type: web
    name: crm-funil-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://crm-funil-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
